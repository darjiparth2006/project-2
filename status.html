<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Parth Library — Status</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="topbar">
      <h2>Current Status</h2>
      <nav><a href="index.html">Home</a> · <a href="books.html">Books</a> · <a href="students.html">Students</a></nav>
    </header>

    <section class="card">
      <div class="card-header"><h3>Allocations <span class="pill small" id="alloc-count">0</span></h3></div>
      <div class="card-body">
        <div class="search-row">
          <input id="alloc-search" placeholder="Filter by student or book">
          <button id="refresh-alloc" class="btn ghost">Refresh</button>
        </div>
        <table id="status-table" class="table">
          <thead><tr><th>Student</th><th>Book</th><th>Date</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
